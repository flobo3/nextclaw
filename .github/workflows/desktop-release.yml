name: desktop-release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload assets to, e.g. v0.8.61-desktop-beta.1"
        required: false
        type: string
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-desktop:
    name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      DESKTOP_RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.release_tag || github.ref_name }}
      DESKTOP_UPDATE_CHANNEL: ${{ contains(github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.release_tag || github.ref_name, 'desktop-beta') && 'beta' || 'stable' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: macos-14
            platform: darwin
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.release_tag || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write bundled update public key
        env:
          NEXTCLAW_DESKTOP_BUNDLE_PRIVATE_KEY: ${{ secrets.NEXTCLAW_DESKTOP_BUNDLE_PRIVATE_KEY }}
        run: pnpm -C apps/desktop bundle:public-key -- --output build/update-bundle-public.pem

      - name: Write desktop release metadata
        run: pnpm -C apps/desktop bundle:release-metadata -- --channel ${{ env.DESKTOP_UPDATE_CHANNEL }} --release-tag ${{ env.DESKTOP_RELEASE_TAG }} --output build/update-release-metadata.json

      - name: Build Desktop (macOS)
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          set -euo pipefail
          pnpm -r --filter @nextclaw/desktop... build
          pnpm -C apps/desktop bundle:seed -- --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}
          CSC_IDENTITY_AUTO_DISCOVERY=false pnpm -C apps/desktop build:main
          CSC_IDENTITY_AUTO_DISCOVERY=false pnpm -C apps/desktop exec electron-builder --mac dmg zip --${{ matrix.arch }} --publish never

      - name: Normalize latest-mac metadata filename
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "apps/desktop/release/latest-mac.yml" ]; then
            cp "apps/desktop/release/latest-mac.yml" "apps/desktop/release/latest-mac-${{ matrix.arch }}.yml"
          fi

      - name: Normalize macOS artifact filenames
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ matrix.arch }}" = "x64" ]; then
            DMG_PATH="$(find apps/desktop/release -maxdepth 1 -type f -name "*.dmg" ! -name "*-arm64.dmg" ! -name "*-x64.dmg" | head -n 1)"
            if [ -n "${DMG_PATH}" ]; then
              TARGET_DMG="${DMG_PATH%.dmg}-x64.dmg"
              mv "${DMG_PATH}" "${TARGET_DMG}"
              if [ -f "${DMG_PATH}.blockmap" ]; then
                mv "${DMG_PATH}.blockmap" "${TARGET_DMG}.blockmap"
              fi
            fi

            ZIP_PATH="$(find apps/desktop/release -maxdepth 1 -type f -name "*-mac.zip" ! -name "*-arm64-mac.zip" ! -name "*-x64-mac.zip" | head -n 1)"
            if [ -n "${ZIP_PATH}" ]; then
              TARGET_ZIP="${ZIP_PATH%-mac.zip}-x64-mac.zip"
              mv "${ZIP_PATH}" "${TARGET_ZIP}"
              if [ -f "${ZIP_PATH}.blockmap" ]; then
                mv "${ZIP_PATH}.blockmap" "${TARGET_ZIP}.blockmap"
              fi
            fi
          fi

      - name: Smoke Desktop Install (macOS DMG)
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          set -euo pipefail
          DMG_PATH="$(find apps/desktop/release -maxdepth 1 -type f -name "*-${{ matrix.arch }}.dmg" | head -n 1)"
          if [ -z "${DMG_PATH}" ]; then
            echo "macOS dmg for arch ${{ matrix.arch }} not found in apps/desktop/release"
            exit 1
          fi
          apps/desktop/scripts/smoke-macos-dmg.sh "${DMG_PATH}" 240

      - name: Build Desktop (Windows)
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:CSC_IDENTITY_AUTO_DISCOVERY = "false"
          pnpm -r --filter @nextclaw/desktop... build
          pnpm -C apps/desktop bundle:seed -- --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}
          pnpm -C apps/desktop build:main
          pnpm -C apps/desktop exec electron-builder --win dir --x64 --publish never

      - name: Build Desktop (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          export CSC_IDENTITY_AUTO_DISCOVERY=false
          pnpm -r --filter @nextclaw/desktop... build
          pnpm -C apps/desktop bundle:seed -- --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}
          pnpm -C apps/desktop build:main
          pnpm -C apps/desktop exec electron-builder --linux AppImage deb --x64 --publish never

      - name: Normalize Linux artifact filenames
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          bash apps/desktop/scripts/normalize-linux-release-artifacts.sh apps/desktop/release

      - name: Smoke Desktop (Windows)
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Test-Path "apps/desktop/release/win-unpacked/NextClaw Desktop.exe")) {
            throw "Windows desktop executable not found in apps/desktop/release/win-unpacked"
          }
          $desktopExe = (Resolve-Path "apps/desktop/release/win-unpacked/NextClaw Desktop.exe").Path
          & "apps/desktop/scripts/smoke-windows-desktop.ps1" -DesktopExePath $desktopExe -StartupTimeoutSec 180

      - name: Smoke Desktop (Linux AppImage)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          APPIMAGE_PATH="$(find apps/desktop/release -maxdepth 1 -type f -name 'NextClaw.Desktop-*-linux-x64.AppImage' | head -n 1)"
          if [ -z "${APPIMAGE_PATH}" ]; then
            echo "Linux AppImage not found in apps/desktop/release"
            exit 1
          fi
          apps/desktop/scripts/smoke-linux-appimage.sh "${APPIMAGE_PATH}" 240

      - name: Smoke Desktop (Linux deb)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          DEB_PATH="$(find apps/desktop/release -maxdepth 1 -type f -name 'nextclaw-desktop_*.deb' | head -n 1)"
          if [ -z "${DEB_PATH}" ]; then
            echo "Linux deb not found in apps/desktop/release"
            exit 1
          fi
          bash apps/desktop/scripts/smoke-linux-deb.sh "${DEB_PATH}"

      - name: Build signed product bundle + manifest (Unix)
        if: matrix.platform != 'win32'
        shell: bash
        env:
          NEXTCLAW_DESKTOP_BUNDLE_PRIVATE_KEY: ${{ secrets.NEXTCLAW_DESKTOP_BUNDLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          BUNDLE_VERSION="$(node -p "require('./packages/nextclaw/package.json').version")"
          LAUNCHER_VERSION="$(node -p "require('./apps/desktop/package.json').version")"

          pnpm -C apps/desktop bundle:build -- \
            --platform ${{ matrix.platform }} \
            --arch ${{ matrix.arch }} \
            --version "$BUNDLE_VERSION" \
            --minimum-launcher-version "$LAUNCHER_VERSION" \
            --output-dir dist-bundles

          BUNDLE_PATH="dist-bundles/nextclaw-bundle-${{ matrix.platform }}-${{ matrix.arch }}-${BUNDLE_VERSION}.zip"
          MANIFEST_PATH="release-manifests/manifest-${DESKTOP_UPDATE_CHANNEL}-${{ matrix.platform }}-${{ matrix.arch }}.json"

          pnpm -C apps/desktop bundle:manifest -- \
            --bundle "$BUNDLE_PATH" \
            --channel "$DESKTOP_UPDATE_CHANNEL" \
            --platform ${{ matrix.platform }} \
            --arch ${{ matrix.arch }} \
            --version "$BUNDLE_VERSION" \
            --minimum-launcher-version "$LAUNCHER_VERSION" \
            --bundle-url "https://github.com/${{ github.repository }}/releases/download/${DESKTOP_RELEASE_TAG}/$(basename "$BUNDLE_PATH")" \
            --release-notes-url "https://github.com/${{ github.repository }}/releases/tag/${DESKTOP_RELEASE_TAG}" \
            --output "$MANIFEST_PATH"

          test -f "apps/desktop/$BUNDLE_PATH"
          test -f "apps/desktop/$MANIFEST_PATH"

      - name: Build signed product bundle + manifest (Windows)
        if: matrix.platform == 'win32'
        shell: pwsh
        env:
          NEXTCLAW_DESKTOP_BUNDLE_PRIVATE_KEY: ${{ secrets.NEXTCLAW_DESKTOP_BUNDLE_PRIVATE_KEY }}
        run: |
          $ErrorActionPreference = "Stop"
          $bundleVersion = node -p "require('./packages/nextclaw/package.json').version"
          $launcherVersion = node -p "require('./apps/desktop/package.json').version"

          pnpm -C apps/desktop bundle:build -- `
            --platform ${{ matrix.platform }} `
            --arch ${{ matrix.arch }} `
            --version $bundleVersion `
            --minimum-launcher-version $launcherVersion `
            --output-dir dist-bundles

          $bundlePath = "dist-bundles/nextclaw-bundle-${{ matrix.platform }}-${{ matrix.arch }}-$bundleVersion.zip"
          $manifestPath = "release-manifests/manifest-$env:DESKTOP_UPDATE_CHANNEL-${{ matrix.platform }}-${{ matrix.arch }}.json"
          $bundleFileName = Split-Path $bundlePath -Leaf

          pnpm -C apps/desktop bundle:manifest -- `
            --bundle $bundlePath `
            --channel $env:DESKTOP_UPDATE_CHANNEL `
            --platform ${{ matrix.platform }} `
            --arch ${{ matrix.arch }} `
            --version $bundleVersion `
            --minimum-launcher-version $launcherVersion `
            --bundle-url "https://github.com/${{ github.repository }}/releases/download/$env:DESKTOP_RELEASE_TAG/$bundleFileName" `
            --release-notes-url "https://github.com/${{ github.repository }}/releases/tag/$env:DESKTOP_RELEASE_TAG" `
            --output $manifestPath

          if (-not (Test-Path (Join-Path "apps/desktop" $bundlePath))) {
            throw "Signed product bundle was not written to apps/desktop/$bundlePath"
          }
          if (-not (Test-Path (Join-Path "apps/desktop" $manifestPath))) {
            throw "Update manifest was not written to apps/desktop/$manifestPath"
          }

      - name: Archive desktop artifacts (Windows)
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Test-Path "apps/desktop/release/win-unpacked")) {
            throw "Windows desktop unpacked directory not found."
          }
          $sourceDir = (Resolve-Path "apps/desktop/release/win-unpacked").Path
          $stagingDir = Join-Path "apps/desktop/release" "win-unpacked-staging"
          if (Test-Path $stagingDir) {
            Remove-Item -Recurse -Force $stagingDir
          }
          New-Item -ItemType Directory -Path $stagingDir | Out-Null
          & robocopy $sourceDir $stagingDir /E /R:2 /W:1 /XF debug.log
          if ($LASTEXITCODE -gt 7) {
            throw "robocopy failed with exit code $LASTEXITCODE"
          }
          $global:LASTEXITCODE = 0
          $desktopVersion = (Get-Content "apps/desktop/package.json" | ConvertFrom-Json).version
          if ([string]::IsNullOrWhiteSpace($desktopVersion)) {
            throw "Desktop package version is missing in apps/desktop/package.json"
          }
          $zipFileName = "NextClaw.Desktop-$desktopVersion-win32-x64-unpacked.zip"
          $zipPath = Join-Path "apps/desktop/release" $zipFileName
          if (Test-Path $zipPath) {
            Remove-Item -Force $zipPath
          }
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::CreateFromDirectory(
            (Resolve-Path $stagingDir).Path,
            (Join-Path (Resolve-Path "apps/desktop/release").Path $zipFileName)
          )
          Remove-Item -Recurse -Force $stagingDir

      - name: Stage Smoke Logs (Windows)
        if: matrix.platform == 'win32' && always()
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $stagingRoot = "apps/desktop/release/windows-smoke-logs"
          if (Test-Path $stagingRoot) {
            Remove-Item -Recurse -Force $stagingRoot
          }
          New-Item -ItemType Directory -Path $stagingRoot | Out-Null

          $homeLogs = Join-Path $env:RUNNER_TEMP "nextclaw-desktop-smoke-home/logs"
          if (Test-Path $homeLogs) {
            Copy-Item -Recurse -Force $homeLogs (Join-Path $stagingRoot "home-logs")
          }

          $appLogs = Join-Path $env:APPDATA "NextClaw Desktop/logs"
          if (Test-Path $appLogs) {
            Copy-Item -Recurse -Force $appLogs (Join-Path $stagingRoot "app-logs")
          }

      - name: Upload Smoke Logs (macOS)
        if: matrix.platform == 'darwin' && always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-smoke-logs-darwin-${{ matrix.arch }}
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/nextclaw-desktop-smoke-home/logs/**
            ${{ runner.temp }}/nextclaw-desktop-smoke-logs/**
            ~/Library/Logs/NextClaw Desktop/**

      - name: Upload Smoke Logs (Windows)
        if: matrix.platform == 'win32' && always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-smoke-logs-win32-x64
          if-no-files-found: warn
          path: |
            apps/desktop/release/windows-smoke-logs/**

      - name: Upload Smoke Logs (Linux)
        if: matrix.platform == 'linux' && always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-smoke-logs-linux-x64
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/nextclaw-desktop-smoke-home/logs/**
            ${{ runner.temp }}/nextclaw-desktop-smoke-logs/**

      - name: Upload desktop artifacts (macOS)
        if: matrix.platform == 'darwin'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-${{ matrix.platform }}-${{ matrix.arch }}
          if-no-files-found: warn
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*-mac.zip
            apps/desktop/release/latest-mac-${{ matrix.arch }}.yml
            apps/desktop/release/*.blockmap
            apps/desktop/dist-bundles/nextclaw-bundle-${{ matrix.platform }}-${{ matrix.arch }}-*.zip
            apps/desktop/release-manifests/manifest-${{ env.DESKTOP_UPDATE_CHANNEL }}-${{ matrix.platform }}-${{ matrix.arch }}.json

      - name: Upload desktop artifacts (Windows)
        if: matrix.platform == 'win32'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            apps/desktop/release/NextClaw.Desktop-*-win32-x64-unpacked.zip
            apps/desktop/dist-bundles/nextclaw-bundle-${{ matrix.platform }}-${{ matrix.arch }}-*.zip
            apps/desktop/release-manifests/manifest-${{ env.DESKTOP_UPDATE_CHANNEL }}-${{ matrix.platform }}-${{ matrix.arch }}.json

      - name: Upload desktop artifacts (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-${{ matrix.platform }}-${{ matrix.arch }}
          if-no-files-found: warn
          path: |
            apps/desktop/release/NextClaw.Desktop-*-linux-x64.AppImage
            apps/desktop/release/NextClaw.Desktop-*-linux-x64.AppImage.blockmap
            apps/desktop/release/nextclaw-desktop_*.deb
            apps/desktop/dist-bundles/nextclaw-bundle-${{ matrix.platform }}-${{ matrix.arch }}-*.zip
            apps/desktop/release-manifests/manifest-${{ env.DESKTOP_UPDATE_CHANNEL }}-${{ matrix.platform }}-${{ matrix.arch }}.json

      - name: Upload bundle update public key
        if: matrix.platform == 'linux' && matrix.arch == 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-update-public-key
          path: |
            apps/desktop/build/update-bundle-public.pem

  publish-release-assets:
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    needs: [build-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-release-*
          path: dist/desktop-release
          merge-multiple: true

      - name: Upload desktop assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || github.event.inputs.release_tag }}
          overwrite_files: true
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            dist/desktop-release/**/*.dmg
            dist/desktop-release/**/*-mac.zip
            dist/desktop-release/**/*-win32-*-unpacked.zip
            dist/desktop-release/**/*.AppImage
            dist/desktop-release/**/*.deb
            dist/desktop-release/**/*.blockmap
            dist/desktop-release/**/nextclaw-bundle-*.zip
            dist/desktop-release/**/manifest-*.json
            dist/desktop-release/**/latest-mac-*.yml
            dist/desktop-release/**/update-bundle-public.pem

  publish-desktop-update-channels:
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    needs: [build-desktop, publish-release-assets]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.release_tag || github.ref_name }}
          fetch-depth: 0

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-release-*
          path: dist/desktop-release
          merge-multiple: true

      - name: Prepare gh-pages worktree
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .tmp/gh-pages

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git worktree add .tmp/gh-pages origin/gh-pages
          else
            git worktree add --detach .tmp/gh-pages
            git -C .tmp/gh-pages checkout --orphan gh-pages
            git -C .tmp/gh-pages rm -rf . >/dev/null 2>&1 || true
            find .tmp/gh-pages -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          fi

      - name: Stage desktop update channel files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp/gh-pages/desktop-updates

          if ! find dist/desktop-release -type f -name 'manifest-*.json' | grep -q .; then
            echo "No desktop update manifests were downloaded."
            exit 1
          fi

          find dist/desktop-release -type f -name 'manifest-*.json' | while read -r manifestPath; do
            manifestFile="$(basename "$manifestPath")"
            channel="$(printf '%s' "$manifestFile" | cut -d- -f2)"
            targetDir=".tmp/gh-pages/desktop-updates/$channel"
            mkdir -p "$targetDir"
            cp "$manifestPath" "$targetDir/$manifestFile"
          done

          if [ -f "dist/desktop-release/update-bundle-public.pem" ]; then
            cp "dist/desktop-release/update-bundle-public.pem" ".tmp/gh-pages/desktop-updates/update-bundle-public.pem"
          fi

          touch .tmp/gh-pages/.nojekyll

      - name: Publish desktop update channels to gh-pages
        shell: bash
        run: |
          set -euo pipefail
          git -C .tmp/gh-pages config user.name "github-actions[bot]"
          git -C .tmp/gh-pages config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C .tmp/gh-pages add desktop-updates .nojekyll
          if git -C .tmp/gh-pages diff --cached --quiet; then
            echo "No desktop update channel changes to publish."
            exit 0
          fi
          git -C .tmp/gh-pages commit -m "chore: publish desktop update channels"
          git -C .tmp/gh-pages push origin HEAD:gh-pages

  publish-linux-apt-repo:
    if: (github.event_name == 'release' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')) && !contains(github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.release_tag || github.ref_name, 'desktop-beta')
    needs: [build-desktop, publish-release-assets, publish-desktop-update-channels]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.release_tag || github.ref_name }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install APT repository toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils dpkg-dev gnupg

      - name: Download Linux desktop artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-release-linux-x64
          path: dist/desktop-release

      - name: Prepare gh-pages worktree
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .tmp/gh-pages .tmp/current-pages-apt dist/linux-apt-input
          mkdir -p dist/linux-apt-input

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git worktree add .tmp/gh-pages origin/gh-pages
            if [ -d ".tmp/gh-pages/apt" ]; then
              cp -R ".tmp/gh-pages/apt" ".tmp/current-pages-apt"
              if [ -d ".tmp/current-pages-apt/pool" ]; then
                find ".tmp/current-pages-apt/pool" -type f -name '*.deb' -exec cp {} dist/linux-apt-input/ \;
              fi
            fi
          else
            git worktree add --detach .tmp/gh-pages
            git -C .tmp/gh-pages checkout --orphan gh-pages
            git -C .tmp/gh-pages rm -rf . >/dev/null 2>&1 || true
            find .tmp/gh-pages -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          fi

      - name: Stage Linux desktop packages for APT
        shell: bash
        run: |
          set -euo pipefail
          find dist/desktop-release -type f -name '*.deb' -exec cp {} dist/linux-apt-input/ \;
          if ! find dist/linux-apt-input -maxdepth 1 -type f -name '*.deb' | grep -q .; then
            echo "No Linux deb artifacts available for APT repo build"
            exit 1
          fi

      - name: Build signed Linux APT repo
        shell: bash
        env:
          NEXTCLAW_APT_GPG_PRIVATE_KEY: ${{ secrets.NEXTCLAW_APT_GPG_PRIVATE_KEY }}
          NEXTCLAW_APT_GPG_PASSPHRASE: ${{ secrets.NEXTCLAW_APT_GPG_PASSPHRASE }}
          NEXTCLAW_APT_GPG_KEY_ID: ${{ secrets.NEXTCLAW_APT_GPG_KEY_ID }}
        run: |
          set -euo pipefail
          node scripts/desktop/build-linux-apt-repo.mjs --input-dir dist/linux-apt-input --output-dir dist/linux-apt-repo --signing-mode env

      - name: Smoke Linux APT fresh install
        shell: bash
        run: |
          set -euo pipefail
          bash apps/desktop/scripts/smoke-linux-apt-repo.sh dist/linux-apt-repo/apt

      - name: Smoke Linux APT upgrade
        if: hashFiles('.tmp/current-pages-apt/dists/stable/main/binary-amd64/Packages') != ''
        shell: bash
        run: |
          set -euo pipefail
          bash apps/desktop/scripts/smoke-linux-apt-repo.sh dist/linux-apt-repo/apt --old-repo-dir .tmp/current-pages-apt

      - name: Publish Linux APT repo to gh-pages
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp/gh-pages
          rm -rf .tmp/gh-pages/apt
          cp -R dist/linux-apt-repo/apt .tmp/gh-pages/apt
          cp apps/desktop/scripts/install-linux-apt.sh .tmp/gh-pages/install-apt.sh
          chmod 0755 .tmp/gh-pages/install-apt.sh
          touch .tmp/gh-pages/.nojekyll
          git -C .tmp/gh-pages config user.name "github-actions[bot]"
          git -C .tmp/gh-pages config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C .tmp/gh-pages add apt install-apt.sh .nojekyll
          if git -C .tmp/gh-pages diff --cached --quiet; then
            echo "No Linux APT repo changes to publish."
            exit 0
          fi
          git -C .tmp/gh-pages commit -m "chore: publish linux apt repo"
          git -C .tmp/gh-pages push origin HEAD:gh-pages
