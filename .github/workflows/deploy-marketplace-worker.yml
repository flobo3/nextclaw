name: Deploy Marketplace Worker

on:
  push:
    branches:
      - master
      - main
    paths:
      - workers/marketplace-api/**
      - .github/workflows/deploy-marketplace-worker.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.1

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build worker
        run: pnpm -C workers/marketplace-api build

      - name: Lint worker
        run: pnpm -C workers/marketplace-api lint

      - name: Typecheck worker
        run: pnpm -C workers/marketplace-api tsc

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.1

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/marketplace-api
          command: deploy
